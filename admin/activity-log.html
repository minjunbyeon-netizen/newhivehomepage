<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?ңлҸҷ кё°лЎқ - HiveMedia Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            margin-bottom: 24px;
        }

        .page-title h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .page-title p {
            color: #666;
            font-size: 14px;
        }

        .filter-bar {
            background: white;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .log-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
        }

        .log-table th,
        .log-table td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .log-table th {
            background: #f9f9f9;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .log-table tr:hover {
            background: #fafafa;
        }

        .log-table tr:last-child td {
            border-bottom: none;
        }

        .action-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .action-badge.create {
            background: #d4edda;
            color: #155724;
        }

        .action-badge.approve {
            background: #cce5ff;
            color: #004085;
        }

        .action-badge.reject {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            margin-top: 8px;
        }

        @media (max-width: 768px) {

            .log-table th,
            .log-table td {
                padding: 10px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>?ңлҸҷ кё°лЎқ</h1>
        <a href="dashboard.html" class="back-btn">?Җ?ңліҙ?ңлЎң ?Ңм•„к°Җкё?/a>
    </div>

    <div class="container">
        <div class="page-title">
            <h2>кҙҖлҰ¬мһҗ ?ңлҸҷ лЎңк·ё</h2>
            <p>?„к? ?ём ң ?ҙл–Ө ?‘м—…???ҳн–ү?ҲлҠ”м§Җ ?•мқё?????ҲмҠө?ҲлӢӨ</p>
        </div>

        <div class="filter-bar">
            <select id="filterAction">
                <option value="">лӘЁл“  ?ңлҸҷ</option>
                <option value="create">кёҖ ?‘м„ұ</option>
                <option value="approve">?№мқё</option>
                <option value="reject">л°ҳл Ө</option>
            </select>
            <select id="filterUser">
                <option value="">лӘЁл“  ?¬мҡ©??/option>
            </select>
            <select id="filterDays">
                <option value="7">мөңк·ј 7??/option>
                <option value="30">мөңк·ј 30??/option>
                <option value="90">мөңк·ј 90??/option>
            </select>
        </div>

        <div class="log-container">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>?јмӢң</th>
                        <th>?¬мҡ©??/th>
                        <th>?ңлҸҷ</th>
                        <th>?ҙмҡ©</th>
                        <th>? нҳ•</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr>
                        <td colspan="5" style="text-align:center; padding:40px; color:#999;">
                            лЎңк·ёлҘ?л¶Ҳлҹ¬?ӨлҠ” мӨ?..
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBeZGgTw8zJoYz26PUfk3xoU-83oMD3v_M",
            authDomain: "hivemedia-archive.firebaseapp.com",
            projectId: "hivemedia-archive",
            storageBucket: "hivemedia-archive.appspot.com",
            messagingSenderId: "305221975765",
            appId: "1:305221975765:web:5d6c8b980e47087f941f17"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // к¶Ңн•ң мІҙнҒ¬ (super_admin, admin лӘЁл‘җ ?Ҳмҡ©)
        const userRole = sessionStorage.getItem('userRole');
        const userTeam = sessionStorage.getItem('userTeam');

        if (userRole === 'staff') {
            alert('кҙҖлҰ¬мһҗл§??‘к·ј?????ҲмҠө?ҲлӢӨ.');
            window.location.href = 'dashboard.html';
        }

        const logBody = document.getElementById('logBody');
        const filterAction = document.getElementById('filterAction');
        const filterUser = document.getElementById('filterUser');
        const filterDays = document.getElementById('filterDays');

        const actionLabels = {
            'create': 'кёҖ ?‘м„ұ',
            'approve': '?№мқё',
            'reject': 'л°ҳл Ө',
            'update': '?ҳм •',
            'delete': '?? ң'
        };

        async function loadLogs() {
            try {
                // orderBy ?Ҷмқҙ мҝјлҰ¬ (?ёлҚұ???„мҡ” ?ҶмқҢ)
                const q = query(collection(db, 'activity_logs'), limit(200));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    logBody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align:center; padding:40px; color:#999;">
                                ?„м§Ғ ?ңлҸҷ кё°лЎқ???ҶмҠө?ҲлӢӨ
                            </td>
                        </tr>
                    `;
                    return;
                }

                // ?°мқҙ???ҳм§‘ л°??•л ¬
                let logs = [];
                const users = new Set();
                const actionFilter = filterAction.value;
                const userFilter = filterUser.value;
                const days = parseInt(filterDays.value);
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - days);

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const timestamp = data.timestamp?.toDate?.() || new Date(data.timestamp);
                    users.add(data.userName || data.userId);

                    // ? м§ң ?„н„°
                    if (timestamp < startDate) return;
                    // ?ңлҸҷ ?„н„°
                    if (actionFilter && data.action !== actionFilter) return;
                    // ?¬мҡ©???„н„°
                    if (userFilter && (data.userName !== userFilter && data.userId !== userFilter)) return;

                    logs.push({ id: doc.id, ...data, timestamp });
                });

                // мөңмӢ ???•л ¬
                logs.sort((a, b) => b.timestamp - a.timestamp);

                // ?¬мҡ©???„н„° ?…лҚ°?ҙнҠё
                const currentUserFilter = filterUser.value;
                filterUser.innerHTML = '<option value="">лӘЁл“  ?¬мҡ©??/option>';
                users.forEach(user => {
                    filterUser.innerHTML += `<option value="${user}" ${user === currentUserFilter ? 'selected' : ''}>${user}</option>`;
                });

                if (logs.length === 0) {
                    logBody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align:center; padding:40px; color:#999;">
                                ?ҙлӢ№ мЎ°кұҙ???ңлҸҷ кё°лЎқ???ҶмҠө?ҲлӢӨ
                            </td>
                        </tr>
                    `;
                    return;
                }

                logBody.innerHTML = logs.map(log => {
                    const dateStr = log.timestamp.toLocaleDateString('ko-KR', {
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <tr>
                            <td>${dateStr}</td>
                            <td>${log.userName || log.userId || '-'}</td>
                            <td><span class="action-badge ${log.action}">${actionLabels[log.action] || log.action}</span></td>
                            <td>${log.detail || '-'}</td>
                            <td>${log.contentType || '-'}</td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading logs:', error);
                logBody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; padding:40px; color:#999;">
                            лЎңк·ёлҘ?л¶Ҳлҹ¬?ӨлҠ”???ӨнҢЁ?ҲмҠө?ҲлӢӨ<br>
                            <small style="color:#ccc;">${error.message}</small>
                        </td>
                    </tr>
                `;
            }
        }

        // ?„н„° ?ҙлІӨ??
        filterAction.addEventListener('change', loadLogs);
        filterUser.addEventListener('change', loadLogs);
        filterDays.addEventListener('change', loadLogs);

        // мҙҲкё° лЎңл“ң
        loadLogs();
    </script>
</body>

</html>
